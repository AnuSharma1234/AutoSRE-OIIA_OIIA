services:
  postgres:
    image: postgres:16-alpine
    container_name: autosre_postgres
    environment:
      POSTGRES_DB: autosre
      POSTGRES_USER: autosre
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /tmp/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosre -d autosre"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - autosre_network

  redis:
    image: redis:7-alpine
    container_name: autosre_redis
    command: redis-server --save "" --appendonly no --dir /tmp
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - autosre_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autosre_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://autosre:${POSTGRES_PASSWORD}@postgres:5432/autosre
      REDIS_URL: redis://redis:6379
      KUBECONFIG: /root/.kube/config
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # --- Event Poller / Trigger Service ---
      SPACETIMEDB_URL: ${SPACETIMEDB_URL:-}
      SPACETIMEDB_MODULE: ${SPACETIMEDB_MODULE:-}
      SPACETIMEDB_TOKEN: ${SPACETIMEDB_TOKEN:-}
      K8S_NAMESPACE: ${K8S_NAMESPACE:-default}
      K8S_IN_CLUSTER: ${K8S_IN_CLUSTER:-false}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      ALERTMANAGER_WEBHOOK_SECRET: ${ALERTMANAGER_WEBHOOK_SECRET:-}
      SUPERPLANE_WEBHOOK_URL: ${SUPERPLANE_WEBHOOK_URL:-}
      SUPERPLANE_API_KEY: ${SUPERPLANE_API_KEY:-}
      SERVICE_PORT: ${SERVICE_PORT:-8001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - autosre_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autosre_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - autosre_network

networks:
  autosre_network:
    driver: bridge

volumes:
  none:
