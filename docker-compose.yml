version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autosre-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autosre
      POSTGRES_USER: autosre
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"  # Only expose to localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosre"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autosre
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/autosre-backend:latest
    container_name: autosre-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Core settings
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: production
      ENVIRONMENT: production

      # Database
      POSTGRES_URL: postgresql://autosre:${POSTGRES_PASSWORD}@postgres:5432/autosre

      # Kubernetes Integration (uses host kubectl)
      K8S_ENABLED: "true"
      K8S_NAMESPACE: default
      K8S_MCP_COMMAND: "npx -y kubernetes-mcp-server@latest"
      K8S_ENABLE_DESTRUCTIVE_OPERATIONS: "false"

      # SuperPlane & JIRA Integration
      SUPERPLANE_ENABLED: ${SUPERPLANE_ENABLED:-true}
      SUPERPLANE_WEBHOOK_SECRET: ${SUPERPLANE_WEBHOOK_SECRET:-}
      JIRA_ENABLED: ${JIRA_ENABLED:-true}
      JIRA_API_URL: ${JIRA_API_URL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}

      # Slack (optional)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "127.0.0.1:8000:8000"  # Only expose to localhost
    volumes:
      - /root/.kube/config:/root/.kube/config:ro  # For kubectl access to K3s
      - ./logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - autosre
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/autosre-frontend:latest
    container_name: autosre-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Backend connection
      NEXT_PUBLIC_API_URL: http://backend:8000

      # Database (for frontend server-side operations)
      POSTGRES_URL: postgresql://autosre:${POSTGRES_PASSWORD}@postgres:5432/autosre

      # Node environment
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "127.0.0.1:3000:3000"  # Only expose to localhost
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - autosre
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: autosre-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - autosre
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  autosre:
    driver: bridge
