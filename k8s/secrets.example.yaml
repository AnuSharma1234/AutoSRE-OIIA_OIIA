# IMPORTANT: DO NOT COMMIT THIS FILE WITH ACTUAL SECRETS!
# Copy this to secrets.yaml and fill in your actual values
# Then apply with: kubectl apply -f secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: autosre-secrets
  namespace: autosre
type: Opaque
stringData:
  anthropic-api-key: "sk-ant-api03-YOUR_KEY_HERE"
  postgres-url: "postgresql://user:password@host:5432/database?sslmode=require"
  superplane-webhook-secret: "YOUR_SUPERPLANE_WEBHOOK_SECRET"  # Optional
  jira-api-url: "https://your-domain.atlassian.net"  # Optional
  jira-api-token: "YOUR_JIRA_API_TOKEN"  # Optional
