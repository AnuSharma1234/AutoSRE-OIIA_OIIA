services:
  postgres:
    environment:
      - POSTGRES_DB=autosre
      - POSTGRES_USER=autosre
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ENVIRONMENT=development

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      - NODE_ENV=development

volumes:
  postgres_data:
